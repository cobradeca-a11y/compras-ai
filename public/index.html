<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>compras.ai — Assistente de Licitações</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d47;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --user-bubble: #1e3a5f;
    --ai-bubble: #141d2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .badge { font-family: 'DM Mono', monospace; font-size: 0.65rem; background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); color: var(--accent); padding: 2px 8px; border-radius: 4px; letter-spacing: 1px; }
  .new-btn { font-family: 'DM Mono', monospace; font-size: 0.7rem; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .new-btn:hover { border-color: var(--accent); color: var(--accent); }

  #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; gap: 12px; animation: fadeUp 0.3s ease; max-width: 820px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai { align-self: flex-start; }

  .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; font-family: 'Syne', sans-serif; }
  .msg.ai .avatar { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; }
  .msg.user .avatar { background: var(--user-bubble); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }

  .bubble { padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; line-height: 1.65; max-width: 640px; }
  .msg.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg.user .bubble { background: var(--user-bubble); border: 1px solid rgba(0,212,255,0.15); border-top-right-radius: 4px; }

  .result-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-top: 12px; font-size: 0.85rem; }
  .result-card h3 { font-family: 'Syne', sans-serif; font-size: 0.75rem; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .result-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .result-item label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 4px; }
  .result-item .val { font-weight: 500; font-size: 0.85rem; }

  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-family: 'DM Mono', monospace; }
  .tag.green { background: rgba(16,185,129,0.15); color: var(--accent3); border: 1px solid rgba(16,185,129,0.3); }
  .tag.yellow { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid rgba(245,158,11,0.3); }
  .tag.red { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
  .tag.blue { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.25); }

  .docs-list { list-style: none; }
  .docs-list li { padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; font-size: 0.83rem; }
  .docs-list li:last-child { border-bottom: none; }
  .docs-list li .doc-info small { display: block; color: var(--muted); font-size: 0.72rem; margin-top: 2px; font-family: 'DM Mono', monospace; }
  .alert-box { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25); border-radius: 8px; padding: 12px; margin-top: 12px; font-size: 0.82rem; color: #d4a04a; }
  .alert-box strong { color: var(--warn); }

  .typing { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  .options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .opt-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .opt-btn:hover { border-color: var(--accent); color: var(--accent); }

  .input-area { flex-shrink: 0; padding: 16px 24px; background: var(--surface); border-top: 1px solid var(--border); }
  .input-wrap { display: flex; align-items: flex-end; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; transition: border-color 0.2s; max-width: 860px; margin: 0 auto; }
  .input-wrap:focus-within { border-color: rgba(0,212,255,0.4); }
  #userInput { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; resize: none; max-height: 120px; line-height: 1.5; }
  #userInput::placeholder { color: var(--muted); }
  .send-btn { background: var(--accent); border: none; color: var(--bg); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; font-size: 1rem; }
  .send-btn:hover { background: #00b8d9; }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  .disclaimer { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); text-align: center; margin-top: 8px; max-width: 860px; margin: 8px auto 0; }

  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; gap: 16px; padding: 40px; }
  .welcome-logo { font-family: 'Syne', sans-serif; font-size: 3rem; font-weight: 800; line-height: 1; }
  .welcome-logo span { color: var(--accent); }
  .welcome p { color: var(--muted); font-size: 0.95rem; max-width: 500px; line-height: 1.7; }
  .quick-starts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 560px; margin-top: 8px; }
  .qs-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; text-align: left; cursor: pointer; transition: all 0.2s; color: var(--text); font-family: 'DM Sans', sans-serif; }
  .qs-btn:hover { border-color: var(--accent); background: rgba(0,212,255,0.03); }
  .qs-btn .qs-icon { font-size: 1.3rem; margin-bottom: 6px; display: block; }
  .qs-btn .qs-title { font-size: 0.82rem; font-weight: 500; display: block; }
  .qs-btn .qs-sub { font-size: 0.72rem; color: var(--muted); display: block; margin-top: 2px; }

  @media (max-width: 600px) {
    .result-grid { grid-template-columns: 1fr; }
    .quick-starts { grid-template-columns: 1fr; }
    .welcome-logo { font-size: 2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">compras<span>.ai</span></div>
  <div class="badge">BETA · LEI 14.133/2021</div>
  <button class="new-btn" onclick="resetChat()">+ NOVA ANÁLISE</button>
</header>

<div id="chat">
  <div id="welcome" class="welcome">
    <div class="welcome-logo">compras<span>.ai</span></div>
    <p>Assistente especializado em compras públicas. Descreva o que você precisa adquirir e eu faço o enquadramento normativo completo.</p>
    <div class="quick-starts">
      <button class="qs-btn" onclick="quickStart('Preciso comprar 10 notebooks para o setor de TI')">
        <span class="qs-icon">💻</span><span class="qs-title">Material de TI</span><span class="qs-sub">Notebooks, periféricos</span>
      </button>
      <button class="qs-btn" onclick="quickStart('Preciso contratar serviço de limpeza para o prédio da secretaria')">
        <span class="qs-icon">🧹</span><span class="qs-title">Serviço contínuo</span><span class="qs-sub">Limpeza, vigilância</span>
      </button>
      <button class="qs-btn" onclick="quickStart('Quero contratar empresa para desenvolver um sistema de gestão')">
        <span class="qs-icon">⚙️</span><span class="qs-title">Serviço de TI</span><span class="qs-sub">Desenvolvimento, suporte</span>
      </button>
      <button class="qs-btn" onclick="quickStart('Preciso adquirir bens de consumo para o órgão')">
        <span class="qs-icon">📦</span><span class="qs-title">Bens de consumo</span><span class="qs-sub">Limpeza, copa, manutenção, expediente e outros</span>
      </button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="userInput" rows="1" placeholder="Descreva o que você precisa adquirir ou contratar..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="disclaimer">compras.ai não substitui análise jurídica. Sempre valide com o setor de licitações e assessoria jurídica do órgão.</div>
</div>

<script>
let conversationHistory = [];

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function quickStart(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function addMessage(role, content, isHTML = false) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'ai' ? 'AI' : 'EU';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (isHTML) bubble.innerHTML = content;
  else bubble.textContent = content;
  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'AI';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function buildResultCard(data) {
  const yesNo = (val) => val
    ? '<span class="tag red">✓ SIM — Exigido</span>'
    : '<span class="tag green">✗ NÃO — Dispensado</span>';

  const modalColor = (data.modalidade || '').includes('Dispensa') || (data.modalidade || '').includes('Inexig') ? 'yellow' : 'blue';

  const docsHTML = (data.documentos_obrigatorios || []).map(d => `
    <li>
      <span>${d.obrigatorio ? '✅' : '⬜'}</span>
      <span class="doc-info"><strong>${d.nome}</strong>${d.simplificado ? ' <span class="tag green">SIMPLIFICADO</span>' : ''}<small>${d.base_legal}</small></span>
    </li>`).join('');

  const alertasHTML = (data.alertas || []).map(a => `<div style="margin-bottom:6px">⚠️ ${a}</div>`).join('');
  const legaisHTML = (data.fundamentos_legais || []).map(f => `<span class="tag blue" style="margin:2px">${f}</span>`).join('');

  return `
    <div class="result-card">
      <h3>📋 Enquadramento Normativo — compras.ai</h3>
      <div class="result-grid">
        <div class="result-item"><label>Objeto</label><span class="val">${data.objeto || '—'}</span></div>
        <div class="result-item"><label>Natureza</label><span class="val">${data.natureza || '—'}</span></div>
        <div class="result-item"><label>Modalidade Indicada</label><span class="val"><span class="tag ${modalColor}">${data.modalidade || '—'}</span></span></div>
        <div class="result-item"><label>Critério de Julgamento</label><span class="val">${data.criterio_julgamento || '—'}</span></div>
        <div class="result-item"><label>CATMAT/CATSER Sugerido</label><span class="val" style="font-family:'DM Mono',monospace;font-size:0.8rem">${data.catmat_catser_sugerido || '—'}</span></div>
        <div class="result-item"><label>Faixa de Valor Estimado</label><span class="val">${data.valor_estimado_faixa || 'A definir'}</span></div>
      </div>
      <div class="result-grid">
        <div class="result-item"><label>Exige ETP?</label>${yesNo(data.exige_etp)}</div>
        <div class="result-item"><label>Exige Mapa de Risco?</label>${yesNo(data.exige_mapa_risco)}</div>
        <div class="result-item"><label>Exige DFD?</label>${yesNo(data.exige_dfd)}</div>
        <div class="result-item"><label>Cota ME/EPP?</label>${yesNo(data.aplicar_exclusividade_me_epp)}</div>
      </div>
      <div class="result-item" style="margin-bottom:12px"><label>Fundamentos Legais</label><div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">${legaisHTML}</div></div>
      <div class="result-item" style="margin-bottom:12px"><label>Documentos Obrigatórios</label><ul class="docs-list" style="margin-top:8px">${docsHTML}</ul></div>
      ${alertasHTML ? `<div class="alert-box"><strong>⚠️ Atenção:</strong><div style="margin-top:8px">${alertasHTML}</div></div>` : ''}
      ${data.observacoes ? `<div style="margin-top:12px;padding:10px;background:var(--surface);border-radius:8px;font-size:0.82rem;color:var(--muted)">💡 ${data.observacoes}</div>` : ''}
    </div>`;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  hideWelcome();
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  addTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });

    const data = await response.json();
    removeTyping();

    if (data.error) {
      addMessage('ai', '❌ Erro: ' + data.error);
      return;
    }

    const rawText = data.text || '';
    const jsonMatch = rawText.match(/ANÁLISE_JSON:\s*([\s\S]+)/);

    if (jsonMatch) {
      const textBefore = rawText.replace(/ANÁLISE_JSON:[\s\S]+/, '').trim();
      let analysisData = null;
      try { analysisData = JSON.parse(jsonMatch[1].trim()); } catch(e) {}
      if (textBefore) addMessage('ai', textBefore);
      if (analysisData) {
        addMessage('ai', buildResultCard(analysisData), true);
        addMessage('ai', `
          <div style="color:var(--muted);font-size:0.82rem">Análise concluída. Deseja que eu gere algum documento?</div>
          <div class="options" style="margin-top:8px">
            <button class="opt-btn" onclick="quickStart('Gere o texto do DFD para essa contratação')">Gerar DFD</button>
            <button class="opt-btn" onclick="quickStart('Gere o roteiro do ETP para essa contratação')">Roteiro ETP</button>
            <button class="opt-btn" onclick="quickStart('Gere a minuta do Termo de Referência')">Minuta TR</button>
            <button class="opt-btn" onclick="quickStart('Quais os principais riscos dessa contratação?')">Mapa de Risco</button>
          </div>`, true);
      }
    } else {
      addMessage('ai', rawText);
    }

    conversationHistory.push({ role: 'assistant', content: rawText });

  } catch(err) {
    removeTyping();
    addMessage('ai', '❌ Erro de conexão com o servidor. Tente novamente.');
  }

  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

function resetChat() {
  conversationHistory = [];
  const chat = document.getElementById('chat');
  chat.innerHTML = `
    <div id="welcome" class="welcome">
      <div class="welcome-logo">compras<span>.ai</span></div>
      <p>Assistente especializado em compras públicas. Descreva o que você precisa adquirir e eu faço o enquadramento normativo completo.</p>
      <div class="quick-starts">
        <button class="qs-btn" onclick="quickStart('Preciso comprar 10 notebooks para o setor de TI')"><span class="qs-icon">💻</span><span class="qs-title">Material de TI</span><span class="qs-sub">Notebooks, periféricos</span></button>
        <button class="qs-btn" onclick="quickStart('Preciso contratar serviço de limpeza para o prédio da secretaria')"><span class="qs-icon">🧹</span><span class="qs-title">Serviço contínuo</span><span class="qs-sub">Limpeza, vigilância</span></button>
        <button class="qs-btn" onclick="quickStart('Quero contratar empresa para desenvolver um sistema de gestão')"><span class="qs-icon">⚙️</span><span class="qs-title">Serviço de TI</span><span class="qs-sub">Desenvolvimento, suporte</span></button>
        <button class="qs-btn" onclick="quickStart('Preciso adquirir bens de consumo para o órgão')"><span class="qs-icon">📦</span><span class="qs-title">Bens de consumo</span><span class="qs-sub">Limpeza, copa, manutenção, expediente e outros</span></button>
      </div>
    </div>`;
}
</script>
</body>
</html>
